# Nom du projet sur SonarCloud
sonar.projectKey=BobApp_Front
sonar.organization=juliodan57
sonar.host.url=https://sonarcloud.io

# Dossier des sources
sonar.sources=src

# Tests
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Rapport de coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/test.ts,**/environments/**,**/build-wrapper-dump.json,**/assets/**

# Encoding
sonar.sourceEncoding=UTF-8